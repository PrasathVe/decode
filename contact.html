<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enquiry Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f9;
  }

  .container {
    background: #ffffff;
    padding: 35px;
    width: 380px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  }

  h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
    color: #555;
  }

  input, textarea {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: all 0.25s ease;
    background: #fafafa;
  }

  input:focus, textarea:focus {
    border-color: #4a90e2;
    background: #fff;
    box-shadow: 0 0 0 2px rgba(74,144,226,0.1);
  }

  textarea {
    resize: none;
    height: 110px;
  }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #caac33;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background: #ffd21f;
  }
@keyframes float {
  0% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-12px);
  }
  100% {
    transform: translateY(0px);
  }
}

.container {
  background: #ffffff;
  padding: 35px;
  width: 380px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);

  animation: float 1s ease-in-out infinite;
}


.container:hover {
  animation-play-state: paused;
}
  .footer-text {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-top: 15px;
  }

</style>
</head>

<body>

<div class="container">
  <h2>Enquiry</h2>

  <form action="https://formspree.io/f/mojpabgj" method="POST">
    
    <input type="hidden" name="_subject" value="New Enquiry Form Submission">

    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label>Contact Number</label>
      <input type="tel" name="phone" placeholder="Enter your number" required>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea name="message" placeholder="Write your message..." required></textarea>
    </div>

    <button type="submit">Send Message</button>

  </form>

  <div class="footer-text">
    We'll get back to you soon
  </div>
</div>

</body>
</html>
